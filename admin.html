<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blessing Enterprise Admin</title>
    <meta
      name="description"
      content="Standalone admin dashboard for Blessing Enterprise orders, delivery workflow, and catalog management."
    />
    <link rel="icon" href="imag/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --admin-ink: #14213d;
        --admin-ink-soft: #33415c;
        --admin-surface: rgba(255, 255, 255, 0.9);
        --admin-line: rgba(20, 33, 61, 0.08);
        --brand-pink: #ff6fb4;
        --brand-purple: #8e44ad;
        --brand-ink: #2d1f37;
        --admin-page-pad: clamp(1rem, 2.5vw, 2rem);
        --admin-header-height: 4.25rem;
        --admin-sidebar-width: 18rem;
        --admin-sidebar-gap: 1.25rem;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        overflow-x: hidden;
        scrollbar-gutter: stable;
      }

      body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        overscroll-behavior-x: none;
        touch-action: pan-y;
        font-family: "Plus Jakarta Sans", sans-serif;
        color: var(--admin-ink);
        background:
          radial-gradient(circle at top left, rgba(255, 111, 180, 0.12), transparent 30%),
          radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 28%),
          linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      }

      #admin-standalone-root,
      #admin-dashboard-shell {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.28) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.28) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: linear-gradient(180deg, rgba(0,0,0,0.35), transparent 82%);
      }

      h1, h2, h3 {
        font-family: "Cormorant Garamond", serif;
      }

      .section-shell {
        width: min(1180px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0;
      }

      #admin-dashboard-shell .section-shell {
        width: 100%;
        max-width: none;
        padding: 0;
      }

      .glass-panel {
        border: 1px solid var(--admin-line);
        background: var(--admin-surface);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .accent-panel {
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      }

      .shadow-soft {
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      .btn-primary {
        background: linear-gradient(135deg, #0f172a, #ec4899);
        box-shadow: 0 18px 34px rgba(15, 23, 42, 0.16);
      }

      .btn-primary:hover {
        filter: brightness(1.04);
      }

      .btn-secondary {
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(255, 255, 255, 0.92);
        color: var(--admin-ink);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 1);
      }

      .admin-shell {
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }

      #admin-dashboard-shell .admin-shell {
        min-height: 100vh;
        border-radius: 0 !important;
        padding: calc(var(--admin-header-height) + var(--admin-page-pad)) var(--admin-page-pad) var(--admin-page-pad) !important;
      }

      .admin-shell::after {
        content: "";
        position: absolute;
        right: -9rem;
        top: -8rem;
        width: 22rem;
        height: 22rem;
        border-radius: 9999px;
        background: radial-gradient(circle, rgba(236, 72, 153, 0.16), transparent 68%);
        pointer-events: none;
      }

      .admin-layout {
        align-items: start;
        grid-template-columns: minmax(0, 18rem) minmax(0, 1fr) !important;
        overflow-x: hidden;
        width: 100%;
        max-width: 100%;
      }

      .admin-sidebar {
        position: sticky;
        top: 1.5rem;
        align-self: start;
        max-height: calc(100vh - 3rem);
        overflow-y: auto;
        scrollbar-width: none;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.92)),
          linear-gradient(180deg, rgba(236, 72, 153, 0.1), transparent 35%);
        color: white;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
      }

      .admin-sidebar::-webkit-scrollbar {
        display: none;
      }

      .admin-sidebar-card {
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.06);
      }

      .admin-nav-button {
        width: 100%;
      }

      .admin-nav-button span:last-child {
        transition: transform 0.2s ease;
      }

      .admin-nav-button:hover span:last-child {
        transform: scale(1.05);
      }

      .admin-status-banner {
        margin-bottom: 1rem;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      .admin-dashboard-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 30;
        min-height: var(--admin-header-height);
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-left: 0;
        border-right: 0;
        border-top: 0;
        border-radius: 0 !important;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 12px 34px rgba(15, 23, 42, 0.06);
      }

      .admin-dashboard-header h1 {
        font-size: clamp(1.35rem, 2vw, 1.8rem);
        line-height: 1;
      }

      .admin-workspace {
        display: grid;
        gap: 1.5rem;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        overflow-x: hidden;
      }

      @media (min-width: 1280px) {
        #admin-dashboard-shell .admin-shell {
          padding-left: calc(var(--admin-page-pad) + var(--admin-sidebar-width) + var(--admin-sidebar-gap)) !important;
        }

        .admin-layout {
          display: block !important;
        }

        .admin-sidebar {
          position: fixed;
          left: var(--admin-page-pad);
          top: calc(var(--admin-header-height) + var(--admin-page-pad));
          width: var(--admin-sidebar-width);
          max-height: calc(100vh - var(--admin-header-height) - (var(--admin-page-pad) * 2));
          z-index: 20;
        }
      }

      .admin-pane,
      .admin-surface-card {
        max-width: 100%;
        overflow-x: hidden;
        border: 1px solid rgba(148, 163, 184, 0.16);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.96));
        box-shadow: 0 18px 46px rgba(15, 23, 42, 0.07);
      }

      .admin-metric-card {
        border: 1px solid rgba(226, 232, 240, 0.9);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.94));
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 14px 32px rgba(15, 23, 42, 0.06);
      }

      .admin-order-card {
        border: 1px solid rgba(226, 232, 240, 0.88);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.95));
        box-shadow: 0 18px 38px rgba(15, 23, 42, 0.07);
      }

      .admin-order-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 44px rgba(15, 23, 42, 0.1);
      }

      .admin-order-main {
        display: grid;
        gap: 1rem;
      }

      .admin-order-items {
        display: grid;
        gap: 0.85rem;
      }

      .admin-order-item {
        display: grid;
        gap: 0.85rem;
        align-items: start;
        border: 1px solid rgba(226, 232, 240, 0.9);
        background: rgba(255, 255, 255, 0.88);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
      }

      .admin-order-footer {
        margin-top: auto;
        border-top: 1px solid rgba(226, 232, 240, 0.95);
        padding-top: 1rem;
      }

      @media (min-width: 640px) {
        .admin-order-item {
          grid-template-columns: minmax(0, 1fr) auto;
        }
      }

      @media (min-width: 1024px) {
        .admin-order-main {
          grid-template-columns: minmax(0, 1.05fr) minmax(18rem, 0.95fr);
          align-items: start;
        }
      }

      .admin-chip {
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      }

      .admin-subcard {
        border: 1px solid rgba(226, 232, 240, 0.9);
      }

      .admin-form-input,
      .admin-form-textarea {
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      }

      .admin-form-input:focus,
      .admin-form-textarea:focus {
        border-color: rgba(236, 72, 153, 0.4) !important;
        box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
        transform: translateY(-1px);
      }

      @media (max-width: 1279px) {
        .admin-layout {
          grid-template-columns: minmax(0, 1fr) !important;
        }

        .admin-sidebar {
          position: static;
          max-height: none;
        }
      }

      code {
        border-radius: 9999px;
        background: rgba(15, 23, 42, 0.06);
        padding: 0.18rem 0.55rem;
        font-size: 0.85em;
      }
    </style>
  </head>
  <body data-app="admin-dashboard">
    <main id="admin-standalone-root"></main>

    <div
      id="cart-toast"
      class="pointer-events-none fixed bottom-6 left-1/2 z-[60] w-[min(92vw,24rem)] -translate-x-1/2 translate-y-24 rounded-2xl bg-[rgba(15,23,42,0.94)] px-4 py-3 text-sm font-medium text-white opacity-0 shadow-2xl transition duration-300"
    >
      <p id="cart-toast-text">Saved</p>
    </div>

    <script src="products.js"></script>
    <script src="scripts.js"></script>
  </body>
</html>
